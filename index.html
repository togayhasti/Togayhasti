<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اولین وب‌سایت من</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 350px;
            width: 85%;
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #00f2fe;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #00f2fe;
            color: #1e3c72;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #4facfe;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>سلام! به سایت من خوش آمدید 👋</h1>
        <p>من هیچ‌چیز از برنامه‌نویسی نمی‌دانستم، اما این اولین صفحه‌ای است که با گوشی خودم ساختم!</p>
        <a href="https://google.com" class="btn">کلیک کنید</a>
    </div>
</body>
</html>
