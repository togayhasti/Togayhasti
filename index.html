<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل VIP دکتر احمدرضا مکی‌زاده</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tahoma',sans-serif;}

body{
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* افکت شیشه‌ای VIP */
.glass{
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 0 25px rgba(255,215,0,0.25);
}

/* صفحه ورود */
#intro{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity 1.2s ease;
}

.intro-box{text-align:center;}

.candles{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-bottom:35px;
}

.candle{
    width:20px;
    height:80px;
    border-radius:4px;
    position:relative;
    animation:pulse 1.2s infinite alternate ease-in-out;
}
.green{background:#00ff88;}
.red{background:#ff3366;}

@keyframes pulse{
    0%{height:40px;}
    100%{height:120px;}
}

.intro-title{
    color:#ffd700;
    font-size:20px;
    margin-bottom:25px;
}

#enterBtn{
    padding:14px 40px;
    background:linear-gradient(45deg,#ffd700,#b8860b);
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:#111;
    box-shadow:0 0 20px rgba(255,215,0,0.6);
}

/* کارت اصلی */
.main-card{
    max-width:480px;
    margin:120px auto;
    padding:25px;
    border-radius:24px;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

.avatar{
    width:120px;height:120px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 15px;
    border:4px solid #ffd700;
}
.avatar img{
    width:100%;height:100%;object-fit:cover;
}

.title-gold{
    text-align:center;
    font-size:24px;
    color:#ffd700;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#ccc;
    margin-bottom:25px;
}

/* رزومه */
.section-title{
    text-align:center;
    color:#ffd700;
    margin-bottom:15px;
}

.resume-item{
    display:flex;
    gap:12px;
    padding:12px;
    margin-bottom:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
}

.resume-avatar{
    width:55px;height:55px;
    border-radius:50%;
    border:2px solid #ffd700;
    object-fit:cover;
}

.resume-name{
    font-size:14px;
    font-weight:bold;
    color:#ffd700;
    display:block;
    margin-bottom:4px;
}

.resume-desc{
    font-size:12px;
    color:#ddd;
    line-height:1.5;
}

/* دکمه VIP */
.vip-btn{
    display:block;
    text-align:center;
    padding:15px;
    background:linear-gradient(45deg,#ffd700,#b8860b);
    color:#111;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    margin-top:20px;
}

/* نمودار */
#chartCanvas{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:-1;
}
</style>
</head>

<body>

<!-- پس‌زمینه نمودار -->
<canvas id="chartCanvas"></canvas>

<!-- صفحه ورود VIP -->
<div id="intro">
    <div class="intro-box">
        <div class="candles">
            <div class="candle green"></div>
            <div class="candle red"></div>
            <div class="candle green"></div>
            <div class="candle red"></div>
            <div class="candle green"></div>
        </div>
        <h2 class="intro-title">در حال تحلیل بازارهای جهانی...</h2>
        <button id="enterBtn">ورود به پنل VIP</button>
    </div>
</div>

<!-- محتوای اصلی -->
<div class="main-card glass">

    <div class="avatar">
        <img src="https://i.ibb.co/HDrmQqG1/IMG-20260623-115350.avif">
    </div>

    <h1 class="title-gold">دکتر احمدرضا مکی‌زاده</h1>
    <p class="subtitle">مشاور ارشد و استراتژیست مالی</p>

    <!-- رزومه داینامیک -->
    <div class="resume-section glass">
        <h3 class="section-title">سوابق همکاری و پروژه‌ها</h3>
        <div id="resumeList"></div>
    </div>

    <a href="#" class="vip-btn">تماس مستقیم با دفتر</a>
</div>

<!-- آهنگ -->
<audio id="bgMusic" loop>
    <source src="audio-bad-boys-by-inner-circle.mp3" type="audio/mpeg">
</audio>

<script>
/* ------------------ رزومه داینامیک ------------------ */

const resumeData = [
    {name:"دونالد ترامپ", img:"https://i.ibb.co/KcBfbrwC/images-52.jpg", desc:"مشاوره در استراتژی‌های مالیاتی و مدیریت بدهی."},
    {name:"ایلان ماسک", img:"https://i.ibb.co/YBhYQkWR/Elon-Musk-Royal-Society-crop.jpg", desc:"تحلیل جریان نقدینگی پروژه‌های فضایی."},
    {name:"ماهاتما گاندی", img:"https://i.ibb.co/4gXC3mny/images-53.jpg", desc:"طراحی سیستم‌های تأمین مالی خرد."},
    {name:"نادر شاه", img:"https://i.ibb.co/7xZ4586Z/images-49.jpg", desc:"مدیریت خزانه‌داری سلطنتی."},
    {name:"شیخ محمد بن راشد", img:"https://i.ibb.co/FbNpDg2S/images-51.jpg", desc:"طراحی معافیت‌های مالیاتی مناطق آزاد."},
    {name:"وارن بافت", img:"https://i.ibb.co/7NG0PW2b/images-50.jpg", desc:"تحلیل ریسک سرمایه‌گذاری‌های بلندمدت."},
    {name:"بابک زنجانی", img:"https://i.ibb.co/LzrVcX8F/2066265-920.jpg", desc:"مشاوره مبادلات ارزی بین‌المللی."},
    {name:"گوهر خیراندیش", img:"https://i.ibb.co/99GzszXD/images-55.jpg", desc:"مدیریت دارایی‌های شخصی."},
    {name:"عبدالمالک ریگی", img:"https://i.ibb.co/8nwdsSbF/images-56.jpg", desc:"تحلیل گردش وجوه در محیط‌های حساس."},
    {name:"جفری اپستین", img:"https://i.ibb.co/VcPY8rty/images-54.jpg", desc:"تحلیل ساختارهای پیچیده حسابداری."}
];

const resumeList = document.getElementById("resumeList");

resumeData.forEach(item=>{
    const div = document.createElement("div");
    div.className = "resume-item";
    div.innerHTML = `
        <img class="resume-avatar" src="${item.img}">
        <div>
            <span class="resume-name">${item.name}</span>
            <span class="resume-desc">${item.desc}</span>
        </div>
    `;
    resumeList.appendChild(div);
});


/* ------------------ پخش آهنگ بعد از ۱ ثانیه ------------------ */

const intro = document.getElementById("intro");
const enterBtn = document.getElementById("enterBtn");
const bgMusic = document.getElementById("bgMusic");

enterBtn.addEventListener("click", ()=>{
    intro.style.opacity = "0";
    setTimeout(()=> intro.style.display = "none", 1200);

    setTimeout(()=>{
        bgMusic.muted = false;
        bgMusic.volume = 0.8;
        bgMusic.play().catch(()=>{});
    }, 1000);
});


/* ------------------ نمودار کندلی واقعی + RSI + MACD ------------------ */

const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* تولید داده کندل */
function generateCandles(count){
    let candles = [];
    let price = 1000;

    for(let i=0;i<count;i++){
        let open = price;
        let close = open + (Math.random()*40 - 20);
        let high = Math.max(open, close) + Math.random()*20;
        let low = Math.min(open, close) - Math.random()*20;

        candles.push({open, close, high, low});
        price = close;
    }
    return candles;
}

let candles = generateCandles(200);

/* رسم کندل */
function drawCandles(){
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    const candleWidth = 6;
    const gap = 3;
    const totalWidth = candles.length * (candleWidth + gap);
    const startX = (w - totalWidth) / 2;

    candles.forEach((c, i)=>{
        const x = startX + i*(candleWidth+gap);

        const scale = 0.25;

        const openY = h - c.open*scale;
        const closeY = h - c.close*scale;
        const highY = h - c.high*scale;
        const lowY = h - c.low*scale;

        ctx.strokeStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(x + candleWidth/2, highY);
        ctx.lineTo(x + candleWidth/2, lowY);
        ctx.stroke();

        ctx.fillStyle = c.close > c.open ? "#00ff88" : "#ff3366";
        ctx.fillRect(x, Math.min(openY, closeY), candleWidth, Math.abs(openY-closeY));
    });
}

/* اندیکاتور RSI */
function calcRSI(data, period=14){
    let gains = [];
    let losses = [];

    for(let i=1;i<data.length;i++){
        let diff = data[i].close - data[i-1].close;
        gains.push(Math.max(diff,0));
        losses.push(Math.max(-diff,0));
    }

    let rsi = [];

    for(let i=period;i<gains.length;i++){
        let avgGain = gains.slice(i-period,i).reduce((a,b)=>a+b)/period;
        let avgLoss = losses.slice(i-period,i).reduce((a,b)=>a+b)/period;

        let rs = avgGain / avgLoss;
        rsi.push(100 - (100/(1+rs)));
    }

    return rsi;
}

/* اندیکاتور MACD */
function EMA(data, period){
    let k = 2/(period+1);
    let ema = [data[0]];

    for(let i=1;i<data.length;i++){
        ema.push(data[i]*k + ema[i-1]*(1-k));
    }
    return ema;
}

function calcMACD(data){
    let closes = data.map(c=>c.close);
    let ema12 = EMA(closes,12);
    let ema26 = EMA(closes,26);
    let macd = ema12.map((v,i)=>v-ema26[i]);
    let signal = EMA(macd,9);
    return {macd, signal};
}

/* رسم اندیکاتورها */
function drawIndicators(){
    const w = canvas.width;
    const h = canvas.height;

    const rsi = calcRSI(candles);
    const macdData = calcMACD(candles);

    ctx.strokeStyle = "#ffd700";
    ctx.beginPath();
    rsi.forEach((v,i)=>{
        const x = i*3;
        const y = h - (v*3);
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.strokeStyle = "#00aaff";
    ctx.beginPath();
    macdData.macd.forEach((v,i)=>{
        const x = i*3;
        const y = h/2 - v*2;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.strokeStyle = "#ff00aa";
    ctx.beginPath();
    macdData.signal.forEach((v,i)=>{
        const x = i*3;
        const y = h/2 - v*2;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
}

/* انیمیشن */
function animate(){
    drawCandles();
    drawIndicators();
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
