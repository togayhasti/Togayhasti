<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دکتر احمدرضا مکی‌زاده | مدیریت مالی و حسابداری</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #070b19 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2); /* خط دور طلایی ملایم */
            max-width: 380px;
            width: 90%;
        }
        .finance-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            border-radius: 20px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }
        .finance-icon svg {
            width: 35px;
            height: 35px;
            fill: #070b19;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 1.7rem;
            color: #ffffff;
            font-weight: 800;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #d4af37; /* رنگ طلایی */
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 30px;
        }
        .specialties {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 10px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .spec-item {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .spec-item strong {
            display: block;
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .btn {
            display: block;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #070b19;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- آیکون رسمی نمودار مالی و رشد -->
        <div class="finance-icon">
            <svg viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
            </svg>
        </div>
        
        <h1>دکتر احمدرضا مکی‌زاده</h1>
        <div class="subtitle">متخصص مدیریت مالی و حسابداری</div>
        
        <p>تحلیل دقیق داده‌ها، نظارت بر جریان نقدینگی و بودجه‌بندی استراتژیک؛ راهکارهای هوشمندانه برای تضمین پایداری و رشد اقتصادی کسب‌وکارها.</p>
        
        <div class="specialties">
            <div class="spec-item">
                <strong>مدیریت مالی</strong>
                بهینه‌سازی سرمایه
            </div>
            <div class="spec-item">
                <strong>حسابداری</strong>
                شفافیت و ساختار
            </div>
        </div>
        
        <a href="mailto:info@example.com" class="btn">ارتباط با من</a>
    </div>

</body>
</html>
